<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGRIK Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #edf4ef, #f5efe5);
        color: #102418;
        font-family: Manrope, "Segoe UI", sans-serif;
      }
      main {
        width: min(560px, calc(100vw - 32px));
        padding: 28px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 24px 54px rgba(16, 36, 24, 0.12);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.6;
        color: rgba(16, 36, 24, 0.74);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AGRIK is offline</h1>
      <p>The app shell is available, but live advisory, weather, and marketplace data need a connection.</p>
      <p>Reconnect and refresh when the network returns.</p>
    </main>
  </body>
  </html>
